<!DOCTYPE html>
<html>
  <body style="font-family: Roboto, Arial; padding:20px;">

    <div id="list" style="margin-top:15px; font-size:14px;"></div>

    <div style="margin-top:20px; text-align:right;">
      <button onclick="google.script.host.close()"
        style="padding:8px 16px; background:#1a73e8; color:white; border:none; border-radius:4px; cursor:pointer;">
        Done
      </button>
    </div>

    <script>
      const sheets = <?!= JSON.stringify(copiedSheets) ?>;
      const container = document.getElementById("list");

      if (!sheets || sheets.length === 0) {
        container.textContent = "No sheets were copied.";
      } else {
        container.innerHTML =
          "<strong>Sheets copied:</strong><br><br>" +
          sheets.join("<br>");
      }
    </script>

  </body>
</html>
