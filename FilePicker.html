<!DOCTYPE html>
<html>
  <head>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
      html, body {
        height: 100%;
        margin: 0;
        font-family: 'Roboto', Arial, sans-serif;
        background: #f1f3f4;
      }

      .wrapper {
        display: flex;
        flex-direction: column;
        height: 100%;
        box-sizing: border-box;
      }

      .content {
        flex: 1;
        padding: 12px;
        box-sizing: border-box;
      }

      .file-list {
        height: 100%;
        overflow-y: auto;
        background: white;
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(60,64,67,.15);
        pointer-events: auto;
      }

      .file-item {
        padding: 12px 16px;
        font-size: 14px;
        color: #202124;
        cursor: pointer;
        transition: background 0.15s ease;
      }

      .file-item:hover {
        background: #f1f3f4;
      }

      .file-item:not(:last-child) {
        border-bottom: 1px solid #eee;
      }

      .loading,
      .empty,
      .error {
        padding: 16px;
        font-size: 14px;
        color: #5f6368;
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <div class="content">
        <div id="status" class="loading">Loading files...</div>
      </div>
    </div>

    <script>
      const MODE = <?= mode ?>;

      function loadFiles() {
        google.script.run
          .withSuccessHandler(renderFiles)
          .withFailureHandler(showError)
          .getSpreadsheetFiles();
      }

      function renderFiles(files) {
        const container = document.getElementById("status");

        if (!files || files.length === 0) {
          container.innerHTML = "<div class='empty'>No spreadsheets found.</div>";
          return;
        }

        const list = document.createElement("div");
        list.className = "file-list";

        files.forEach(file => {
          const item = document.createElement("div");
          item.className = "file-item";
          item.textContent = file.name;

        item.onclick = () => {
          google.script.run.openProgressDialog(file.id, MODE);
          google.script.host.close();
        };

          list.appendChild(item);
        });

        container.innerHTML = "";
        container.appendChild(list);
      }

      function showError(error) {
        document.getElementById("status").innerHTML =
          "<div class='error'>Error: " + error.message + "</div>";
      }

      window.onload = loadFiles;
    </script>
  </body>
</html>
